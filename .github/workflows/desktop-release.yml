name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to upload assets to (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r backend/requirements.txt -r packaging/requirements.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build macOS desktop app
        working-directory: frontend
        env:
          TRACELABS_DEMO_OPENAI_API_KEY: ${{ secrets.TRACELABS_DEMO_OPENAI_API_KEY }}
        run: npm run dist:judge:mac
      - name: Upload to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.release_tag }} \
            frontend/release/*.dmg \
            frontend/release/*.zip \
            frontend/release/*.blockmap \
            --clobber

  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .venv\Scripts\python -m pip install --upgrade pip
          .venv\Scripts\python -m pip install -r backend\requirements.txt -r packaging\requirements.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build Windows desktop app
        working-directory: frontend
        env:
          TRACELABS_DEMO_OPENAI_API_KEY: ${{ secrets.TRACELABS_DEMO_OPENAI_API_KEY }}
        run: npm run dist:judge:win
      - name: Upload to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.release_tag }} `
            (Get-ChildItem frontend/release/*.exe,frontend/release/*.zip,frontend/release/*.blockmap | Select-Object -ExpandProperty FullName) `
            --clobber
